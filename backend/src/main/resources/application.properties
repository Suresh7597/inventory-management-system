spring.application.name=inventory-management
spring.datasource.url=jdbc:h2:file:./data/inventory-management;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
app.jwt.secret=change-this-development-secret-to-a-long-random-production-secret
app.jwt.expiration-seconds=86400
